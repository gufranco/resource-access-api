services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resource_access
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d resource_access']
      interval: 2s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 2s
      timeout: 5s
      retries: 15

  # Observability backends. Opt in with: docker compose --profile observability up -d
  # The app runs on the host; set OTEL_ENABLED=true and
  # OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318 to send traces here.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.109.0
    profiles: [observability]
    command: ['--config=/etc/otel/collector.yaml']
    volumes:
      - ./deploy/otel/collector.yaml:/etc/otel/collector.yaml:ro
    ports:
      - '4317:4317'
      - '4318:4318'
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.6.0
    profiles: [observability]
    command: ['-config.file=/etc/tempo/tempo.yaml']
    volumes:
      - ./deploy/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - '3200:3200'

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: [observability]
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - '9090:9090'
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  grafana:
    image: grafana/grafana:11.2.0
    profiles: [observability]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - '3001:3000'
    depends_on:
      - prometheus
      - tempo

volumes:
  postgres_data:
  tempo_data:
  grafana_data:
